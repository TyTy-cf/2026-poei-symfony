        min: "Le mot de passe doit faire minimum {{ limit }} caractères"
        not_blank: "Le mot de passe doit être renseigné"
    name:
        min: "Le nom doit faire minimum {{ limit }} caractères"
        not_blank: "Le nom doit être renseigné"
    nickname:
        min: "Le pseudo doit faire minimum {{ limit }} caractères"
        not_blank: "Le pseudo doit être renseigné"
    email:
        not_blank: "L'email doit être renseigné"
category:
