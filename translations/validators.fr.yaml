        min: "Le nom de la catégorie doit faire minimum {{ limit }} caractères"
        max: "Le nom de la catégorie doit faire maximum {{ limit }} caractères"
        not_blank: "Le nom de la catégorie doit être renseigné"
    image:
        max: "L'image de la catégorie doit faire maximum {{ limit }} caractères"
    slug:
        min: "Le slug de la catégorie doit faire minimum {{ limit }} caractères"
        max: "Le slug de la catégorie doit faire maximum {{ limit }} caractères"
        not_blank: "Le slug de la catégorie doit être renseigné"
