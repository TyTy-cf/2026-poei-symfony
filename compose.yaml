services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    volumes:
      - ./:/var/www/html

  caddy:
    build:
      dockerfile: docker/Dockerfile
      target: caddy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - 8443:8443
    volumes:
      - ./:/var/www/html
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - php

  node:
    image: node:22
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: node-dev
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run watch"
    tty: true

  mariadb:
    image: mariadb:10.11.11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: db_steamish
    ports:
      - 3306:3306
    volumes:
      - mariadb:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - 8080:80
    depends_on:
      - mariadb

volumes:
  mariadb:
  caddy_data:
  caddy_config:

